<svg xmlns="http://www.w3.org/2000/svg" width="820" height="210" viewBox="0 0 820 210" role="img" aria-label="Bill of Zero">
  <defs>
    <linearGradient id="emblem" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#BDF589"/>
      <stop offset="1" stop-color="#636EB4"/>
    </linearGradient>
    <radialGradient id="glowGreen" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#BDF589" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#BDF589" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowBlue" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#636EB4" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#636EB4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- backdrop -->
  <rect width="820" height="210" rx="16" fill="#0F0F0F"/>
  <rect x="0.5" y="0.5" width="819" height="209" rx="16" fill="none" stroke="#BDF589" stroke-opacity="0.18"/>

  <!-- ambient glow -->
  <circle cx="180" cy="20" r="240" fill="url(#glowGreen)"/>
  <circle cx="640" cy="200" r="260" fill="url(#glowBlue)"/>

  <!-- shield emblem (centered on top) -->
  <g transform="translate(373,22)">
    <rect width="74" height="74" rx="16" fill="url(#emblem)"/>
    <rect x="3" y="3" width="68" height="68" rx="13" fill="#0F0F0F"/>
    <path d="M37 16 L57 24 V40 C57 53 48 60 37 64 C26 60 17 53 17 40 V24 Z"
          fill="none" stroke="#BDF589" stroke-width="3" stroke-linejoin="round"/>
    <path d="M29 40 l6 6 l12 -14" fill="none" stroke="#BDF589" stroke-width="3"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- wordmark (centered) -->
  <text x="410" y="146" text-anchor="middle"
        font-family="'Segoe UI','Helvetica Neue',Helvetica,Arial,sans-serif"
        font-size="54" font-weight="800" letter-spacing="-1">
    <tspan fill="#FFFFFF">Bill of </tspan><tspan fill="#BDF589">Zero</tspan>
  </text>

  <!-- tagline (centered) -->
  <text x="410" y="176" text-anchor="middle"
        font-family="'Segoe UI','Helvetica Neue',Helvetica,Arial,sans-serif"
        font-size="16" fill="#8C8C8C">Zero-knowledge Letter-of-Credit settlement on Stellar</text>

  <!-- tech chips (centered) -->
  <text x="410" y="196" text-anchor="middle"
        font-family="'DejaVu Sans Mono',Menlo,Consolas,monospace" font-size="12">
    <tspan fill="#636EB4">RISC Zero zkVM</tspan><tspan fill="#8C8C8C">   ·   </tspan><tspan fill="#636EB4">Groth16 on Stellar</tspan><tspan fill="#8C8C8C">   ·   </tspan><tspan fill="#636EB4">Soroban</tspan>
  </text>
</svg>
